<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#0a1620"/>
    </linearGradient>
    <radialGradient id="pulse" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.15"/>
      <stop offset="40%" stop-color="#22c55e" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="88" fill="url(#bg)"/>

  <!-- Subtle border glow -->
  <rect x="1" y="1" width="510" height="510" rx="87" fill="none" stroke="#22c55e" stroke-opacity="0.08" stroke-width="1.5"/>

  <!-- Medical cross watermark -->
  <g transform="translate(256,230)" opacity="0.06">
    <rect x="-60" y="-12" width="120" height="24" rx="4" fill="#22c55e"/>
    <rect x="-12" y="-60" width="24" height="120" rx="4" fill="#22c55e"/>
  </g>

  <!-- Pulse glow at R-peak -->
  <circle cx="204" cy="152" r="60" fill="url(#glow)"/>

  <!-- ECG waveform with smooth bezier curves -->
  <path d="
    M 60,266
    L 86,266
    C 92,266  98,226 108,216
    C 118,206 126,216 130,266
    L 158,266
    C 162,266 166,250 172,250
    L 176,250
    C 180,250 182,220 188,152
    C 192,108 198,104 204,100
    C 210,104 216,108 220,152
    C 226,220 228,250 232,250
    L 236,250
    C 242,250 246,266 250,266
    L 290,266
    C 298,266 306,226 320,218
    C 330,212 338,218 342,266
    C 344,278 348,266 352,266
    L 452,266
  " fill="none" stroke="#22c55e" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- R-peak dot -->
  <circle cx="204" cy="100" r="4" fill="#22c55e" opacity="0.8"/>

  <!-- Typography -->
  <g transform="translate(256,426)">
    <text x="0" y="0" font-family="'Inter Tight','Inter',system-ui,sans-serif" font-size="26" font-weight="800" fill="#22c55e" text-anchor="middle" letter-spacing="8">HEALTH SIMULATOR</text>
    <text x="0" y="20" font-family="'Inter',system-ui,sans-serif" font-size="10" font-weight="500" fill="#556b7a" text-anchor="middle" letter-spacing="4">CRITICAL CARE TRAINING • VERSION 1.0</text>
  </g>
</svg>
