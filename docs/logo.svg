<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1620"/>
      <stop offset="100%" stop-color="#0f202f"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22c55e" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)" stroke="#1e3a2f" stroke-width="2"/>
  <!-- Grid lines -->
  <g stroke="#1a2e3d" stroke-width="0.5" opacity="0.5">
    <line x1="60" y1="120" x2="60" y2="392"/>
    <line x1="140" y1="120" x2="140" y2="392"/>
    <line x1="220" y1="120" x2="220" y2="392"/>
    <line x1="300" y1="120" x2="300" y2="392"/>
    <line x1="380" y1="120" x2="380" y2="392"/>
    <line x1="452" y1="120" x2="452" y2="392"/>
    <line x1="60" y1="160" x2="452" y2="160"/>
    <line x1="60" y1="256" x2="452" y2="256"/>
    <line x1="60" y1="352" x2="452" y2="352"/>
  </g>
  <!-- Glow under ECG -->
  <rect x="60" y="200" width="392" height="120" rx="4" fill="url(#glow)"/>
  <!-- ECG Waveform -->
  <polyline fill="none" stroke="#22c55e" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"
    points="60,256 100,256 120,256 130,200 145,310 160,260 180,260 200,256 220,256 240,256 260,130 280,380 300,220 320,256 340,256 360,256 380,256 400,256 420,256 452,256"/>
  <!-- ECG dot at peak -->
  <circle cx="260" cy="130" r="4" fill="#22c55e" opacity="0.6"/>
  <!-- Pulse glow dot at R-peak -->
  <circle cx="260" cy="130" r="10" fill="#22c55e" opacity="0.15"/>
  <!-- Label -->
  <text x="256" y="440" font-family="'Inter', 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#556b7a" text-anchor="middle" letter-spacing="3">HEALTH SIMULATOR</text>
</svg>
