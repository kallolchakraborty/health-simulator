_schema-version: "3.1"
ID: health-monitor-simulator
description: "Health Monitor Simulator MTA"
version: 1.0.0
modules:
  - name: health-monitor-ui
    type: nodejs
    path: .
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 512M
    provides:
      - name: ui_api
        properties:
          url: ${default-url}
    requires:
      - name: health-monitor-uaa

resources:
  - name: health-monitor-uaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
